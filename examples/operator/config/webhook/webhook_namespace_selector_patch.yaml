---
# This patch adds a namespaceSelector to the ValidatingWebhookConfiguration
# to prevent the webhook from intercepting pods in critical system namespaces.
# Without this, failurePolicy=Fail could block ALL pod creation cluster-wide
# if the webhook server is unavailable (including its own restart).
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
  - name: vpod-v1.kb.io
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - kube-public
            - kube-node-lease
            # The operator's own namespace is excluded to prevent deadlock:
            # if the webhook pod restarts, it must not need webhook approval
            # to start again.
            - k8s-serviceaccount-hijacking-protection-system
