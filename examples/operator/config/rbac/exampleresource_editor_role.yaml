# permissions for end users to edit exampleresources.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: k8s-serviceaccount-hijacking-protection
    app.kubernetes.io/managed-by: kustomize
  name: exampleresource-editor-role
rules:
- apiGroups:
  - app.example.com
  resources:
  - exampleresources
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - app.example.com
  resources:
  - exampleresources/status
  verbs:
  - get
